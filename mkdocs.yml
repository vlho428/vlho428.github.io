site_name: AQR_LAB 筆記庫
site_dir: notes

theme:
  name: material
  # 1. 切換色彩配置
  palette:
  # 淺色模式 (白天)
  - media: "(prefers-color-scheme: light)"
    scheme: default
    primary: indigo          # 官方標誌性的靛藍色
    accent: indigo
    toggle:
      icon: material/brightness-7
      name: 切換至深色模式
    # 深色模式 (夜晚)
  - media: "(prefers-color-scheme: dark)"
    scheme: slate
    primary: indigo          # 深色模式下依然保持靛藍的主色調
    accent: indigo
    toggle:
      icon: material/brightness-4
      name: 切換至淺色模式        # 連結與按鈕高亮顏色 (青綠色)

  # 2. 更改字體 (自動從 Google Fonts 引入)
  font:
    text: Roboto           # 官方使用的無襯線字體
    code: Roboto Mono      # 官方使用的等寬代碼字體
  
  # 3. 網站 Logo 與圖示
  # 你可以將你平時生成的 AI 高畫質專業人像照，或是動漫風格的精緻圖像
  # 存成 logo.png 放在 docs/ 目錄下作為網站標誌
  logo: assets/logo.png
  favicon: assets/logo.png

  # 4. 開啟高階排版功能
  features:
    - navigation.tabs          # 頂部顯示大分類標籤
    - navigation.tabs.sticky   # 往下捲動時，頂部標籤列會吸附在上方
    - navigation.sections      # 左側目錄使用「區塊」樣式 (官方招牌特色)
    - navigation.top           # 顯示「回到頂部」按鈕
    - navigation.tracking      # 捲動時左側目錄自動跟隨
    - toc.integrate            # 將右側的「本頁目錄」整合進左側邊欄，讓版面更乾淨
    - content.code.copy        # 程式碼區塊右上角加入「複製」按鈕
    - content.code.annotate    # 允許在程式碼旁邊加註解
    - content.action.edit      # (可選) 顯示編輯此頁面的按鈕
    - search.suggest           # 搜尋時自動提供建議
    - search.highlight         # 搜尋結果高亮

# 開啟 Markdown 進階擴充 (讓排版更靈活)
markdown_extensions:
  - md_in_html               # 支援 HTML 標籤內使用 Markdown (如 <div markdown>)
  - attr_list                # 支援為 Markdown 元素添加自訂屬性與 CSS class (如 {: .md-button })
  - admonition               # 支援警告/提示區塊
  - pymdownx.details         # 支援可折疊區塊
  - pymdownx.superfences     # 強化程式碼區塊功能
  - pymdownx.tabbed:
      alternate_style: true    # 使用官方新版的頁籤樣式 (無邊框，更乾淨)
  - pymdownx.highlight:
      anchor_linenums: true    # 程式碼行號可點擊，方便參考
      use_pygments: true       # 讓程式碼高亮顏色與主題一致
  - pymdownx.arithmatex:     # 量化公式必備
      generic: true       # 使用 MathJax 的通用配置，適合大多數情況 
  - pymdownx.emoji:            # 支援官方的 Material Icons
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg      
extra_css:
  - stylesheets/extra.css # 你可以在這裡加入自訂的 CSS 來微調外觀
extra_javascript:
  - javascripts/mathjax.js  # 如果需要額外的 JavaScript，可以放
  - https://cdnjs.cloudflare.com/ajax/libs/mathjax/3.2.2/es5/tex-mml-chtml.js   # 從 CDN 引入 MathJax，確保公式能正確渲染