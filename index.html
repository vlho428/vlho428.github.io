<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Quant Research | Quantitative & Infrastructure</title>
    <link rel="stylesheet" href="style.css">
    <!-- 引入專業字體 -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- 互動式背景畫布 -->
    <canvas id="network-canvas"></canvas>

    <div class="wrapper">
        <!-- 頂部導覽 -->
        <nav class="navbar">
            <div class="logo">AQR_LAB<span>.</span></div>
            <div class="nav-links">
                <a href="https://github.com/你的帳號" target="_blank">GitHub</a>
                <a href="#about">About</a>
            </div>
        </nav>

        <!-- 核心視覺區 -->
        <header class="hero">
            <h1>Quantitative Strategies <br>& AI Infrastructure</h1>
            <p class="subtitle">專注於 MSCI Taiwan 指數增強、Barra 10 因子模型與高效能算力中心建置。</p>
            <div class="cta-group">
                <a href="./notes/" class="btn-primary">進入研究筆記庫 (MkDocs)</a>
                <a href="#metrics" class="btn-secondary">查看實驗室指標 ↓</a>
            </div>
        </header>

        <!-- 專業指標看板 -->
        <section id="metrics" class="glass-panel">
            <div class="metric">
                <span class="metric-value" id="alpha-val">Loading...</span>
                <span class="metric-label">模擬年化 Alpha</span>
            </div>
            <div class="metric">
                <span class="metric-value">Qlib</span>
                <span class="metric-label">量化框架</span>
            </div>
            <div class="metric">
                <span class="metric-value">PUE ≤ 1.1</span>
                <span class="metric-label">算力中心能效標準</span>
            </div>
            <div class="metric">
                <span class="metric-value">10 Factors</span>
                <span class="metric-label">風險模型整合</span>
            </div>
        </section>

        <!-- 技術棧標籤 -->
        <section id="stack" class="tech-stack">
            <h3>CORE TECHNOLOGIES</h3>
            <div class="tags">
                <span class="tag">Python</span>
                <span class="tag">PyTorch</span>
                <span class="tag">CUDA 12.9</span>
                <span class="tag">WSL2 / Linux</span>
                <span class="tag">MySQL</span>
                <span class="tag">GB200 NVL72</span>
            </div>
        </section>
    </div>

    <script src="script.js"></script>
</body>
</html>
